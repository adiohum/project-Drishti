<!DOCTYPE html>
<html>
<head>
  <title>PROJECT DRISHTI - ADVANCED HUD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at center, #050510, #000);
      color: #00ffff;
      overflow-x: hidden;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      letter-spacing: 4px;
      text-shadow: 0 0 15px #00ffff;
    }

    #status {
      font-size: 13px;
      margin-top: 5px;
    }

    #videoContainer {
      position: relative;
      width: 720px;
      margin: 30px auto;
      border: 2px solid #00ffff;
      border-radius: 12px;
      box-shadow: 0 0 25px #00ffff;
      overflow: hidden;
      transition: 0.3s;
    }

    #videoContainer.danger {
      border-color: red;
      box-shadow: 0 0 30px red;
    }

    video, canvas {
      width: 100%;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Corner HUD Brackets */
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 2px solid #00ffff;
    }

    .tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
    .tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
    .bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
    .br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

    /* Radar */
    #radar {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 100px;
      height: 100px;
      border: 1px solid #00ffff;
      border-radius: 50%;
      overflow: hidden;
    }

    #radar::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 2px;
      background: #00ffff;
      top: 50%;
      animation: sweep 3s linear infinite;
      transform-origin: left center;
    }

    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #distanceBarContainer {
      width: 720px;
      height: 10px;
      margin: 10px auto;
      background: rgba(0,255,255,0.1);
      border-radius: 10px;
    }

    #distanceBar {
      height: 100%;
      width: 0%;
      background: #00ffff;
      border-radius: 10px;
      transition: width 0.3s, background 0.3s;
    }

    button {
      margin: 15px;
      padding: 10px 25px;
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      cursor: pointer;
      letter-spacing: 2px;
    }

    button:hover {
      background: #00ffff;
      color: black;
    }

    #log {
      width: 720px;
      margin: 20px auto;
      font-size: 12px;
      opacity: 0.8;
      min-height: 40px;
    }
  </style>
</head>

<body>

<h1>PROJECT DRISHTI</h1>
<div id="status">SYSTEM: IDLE</div>

<div id="videoContainer">
  <video id="video" autoplay muted></video>
  <canvas id="canvas"></canvas>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="radar"></div>
</div>

<div id="distanceBarContainer">
  <div id="distanceBar"></div>
</div>

<button onclick="startSystem()">ACTIVATE</button>
<button onclick="stopSystem()">SHUTDOWN</button>

<div id="log">Awaiting activation...</div>

<script>
let model;
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let statusText = document.getElementById("status");
let logDiv = document.getElementById("log");
let distanceBar = document.getElementById("distanceBar");
let container = document.getElementById("videoContainer");

let stream = null;
let detecting = false;

async function bootSequence() {
  statusText.innerText = "SYSTEM: INITIALIZING...";
  await new Promise(r => setTimeout(r, 800));
  statusText.innerText = "SYSTEM: LOADING MODEL...";
  model = await cocoSsd.load();
  statusText.innerText = "SYSTEM: CALIBRATION COMPLETE";
  await new Promise(r => setTimeout(r, 800));
}

async function startSystem() {
  await bootSequence();

  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    detecting = true;
    statusText.innerText = "SYSTEM: VISION ACTIVE";
    detectFrame();
  };
}

function stopSystem() {
  detecting = false;
  if (stream) stream.getTracks().forEach(track => track.stop());
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  statusText.innerText = "SYSTEM: IDLE";
  logDiv.innerHTML = "System shutdown.";
  distanceBar.style.width = "0%";
  container.classList.remove("danger");
}

async function detectFrame() {
  if (!detecting) return;

  const predictions = await model.detect(video);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let closestWidth = 0;
  let logText = "";

  predictions.forEach(prediction => {
    const [x, y, width, height] = prediction.bbox;
    ctx.strokeStyle = "#00ffff";
    ctx.strokeRect(x, y, width, height);
    ctx.fillStyle = "#00ffff";
    ctx.fillText(prediction.class, x, y > 10 ? y - 5 : 10);

    logText += prediction.class + " detected<br>";
    if (width > closestWidth) closestWidth = width;
  });

  updateDistanceBar(closestWidth);
  logDiv.innerHTML = logText || "Scanning...";

  requestAnimationFrame(detectFrame);
}

function updateDistanceBar(width) {
  let percent = Math.min(width / 4, 100);
  distanceBar.style.width = percent + "%";

  if (percent > 80) {
    distanceBar.style.background = "red";
    container.classList.add("danger");
    statusText.innerText = "SYSTEM: ⚠ DANGER";
  } else {
    distanceBar.style.background = "#00ffff";
    container.classList.remove("danger");
  }
}
</script>

</body>
</html>
