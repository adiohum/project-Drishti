<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Drishti</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{
    margin:0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at center, #050510 0%, #000000 100%);
    color:#00ffff;
    overflow:hidden;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

#video{
    display:none;
}

#ui{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.panel{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(8px);
    border:1px solid #00ffff;
    padding:15px;
    border-radius:10px;
}

button{
    pointer-events:auto;
    background:black;
    border:1px solid #00ffff;
    color:#00ffff;
    padding:10px 15px;
    margin-top:10px;
    cursor:pointer;
}

#scanline{
    position:absolute;
    width:100%;
    height:2px;
    background:#00ffff;
    animation:scan 3s linear infinite;
    opacity:0.4;
}

@keyframes scan{
    0%{top:0;}
    100%{top:100%;}
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
</head>

<body>

<div id="scanline"></div>

<video id="video" autoplay muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <div class="panel">
        <div>PROJECT DRISHTI</div>
        <button onclick="startSystem()">Start Camera</button>
        <button onclick="stopSystem()">Stop Camera</button>
    </div>
</div>

<script>

let model, stream;
let detecting=false;
let objectStates={};

const STABLE_FRAMES = 6;
const LOST_FRAMES = 12;
const COOLDOWN = 4000;

let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

function estimateDistance(width){
    let knownWidth=0.5;
    let focalLength=600;
    return (knownWidth * focalLength) / width;
}

function speak(text){
    window.speechSynthesis.cancel();
    let utter=new SpeechSynthesisUtterance(text);
    utter.rate=1;
    utter.pitch=0.9;
    window.speechSynthesis.speak(utter);
}

async function startSystem(){
    model=await cocoSsd.load();
    stream=await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject=stream;

    video.onloadedmetadata=()=>{
        canvas.width=video.videoWidth;
        canvas.height=video.videoHeight;
        detecting=true;
        objectStates={};
        detectLoop();
    };
}

function stopSystem(){
    detecting=false;
    if(stream) stream.getTracks().forEach(t=>t.stop());
    window.speechSynthesis.cancel();
    objectStates={};
}

async function detectLoop(){
    if(!detecting) return;

    const predictions=await model.detect(video);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let detectedThisFrame={};

    predictions.forEach(p=>{
        if(p.score<0.75) return;

        const [x,y,w,h]=p.bbox;
        detectedThisFrame[p.class]=true;

        if(!objectStates[p.class]){
            objectStates[p.class]={
                seen:0,
                lost:0,
                announced:false,
                lastSpoken:0
            };
        }

        let obj=objectStates[p.class];
        obj.seen++;
        obj.lost=0;

        let distance=estimateDistance(w).toFixed(1);

        ctx.strokeStyle="#00ffff";
        ctx.lineWidth=2;
        ctx.strokeRect(x,y,w,h);

        ctx.fillStyle="#00ffff";
        ctx.fillText(
            p.class+" | "+distance+"m",
            x,
            y>10?y-5:10
        );

        if(obj.seen>=STABLE_FRAMES && !obj.announced){
            let now=Date.now();
            if(now-obj.lastSpoken>COOLDOWN){
                speak(p.class+" detected at "+distance+" meters");
                obj.lastSpoken=now;
                obj.announced=true;
            }
        }
    });

    for(let key in objectStates){
        if(!detectedThisFrame[key]){
            let obj=objectStates[key];
            obj.lost++;

            if(obj.lost>=LOST_FRAMES){
                let now=Date.now();
                if(now-obj.lastSpoken>COOLDOWN){
                    speak(key+" no longer detected");
                }
                delete objectStates[key];
            }
        }
    }

    requestAnimationFrame(detectLoop);
}

</script>
</body>
</html>
