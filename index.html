<!DOCTYPE html>
<html>
<head>
  <title>PROJECT DRISHTI - ADVANCED AI HUD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: #00ffff;
      overflow: hidden;
      text-align: center;
    }

    canvas#particles {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -3;
    }

    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background-image:
        linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 25s linear infinite;
      z-index: -2;
    }

    @keyframes gridMove {
      from { transform: translate(0,0); }
      to { transform: translate(-60px,-60px); }
    }

    h1 {
      margin-top: 20px;
      letter-spacing: 4px;
      text-shadow: 0 0 15px #00ffff;
    }

    #status {
      font-size: 13px;
      margin-top: 5px;
    }

    #bootOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: #00ffff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 18px;
      z-index: 10;
      letter-spacing: 2px;
    }

    #videoContainer {
      position: relative;
      width: 720px;
      margin: 30px auto;
      border: 2px solid #00ffff;
      border-radius: 12px;
      box-shadow: 0 0 25px #00ffff;
      overflow: hidden;
      background: rgba(0,0,0,0.6);
    }

    #videoContainer.danger {
      border-color: red;
      box-shadow: 0 0 35px red;
    }

    video, #canvas {
      width: 100%;
      display: block;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 2px solid #00ffff;
    }

    .tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
    .tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
    .bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
    .br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

    #radar {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #00ffff;
      overflow: hidden;
    }

    #distanceBarContainer {
      width: 720px;
      height: 10px;
      margin: 10px auto;
      background: rgba(0,255,255,0.1);
      border-radius: 10px;
    }

    #distanceBar {
      height: 100%;
      width: 0%;
      background: #00ffff;
      border-radius: 10px;
      transition: 0.3s;
    }

    button {
      margin: 15px;
      padding: 10px 25px;
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      cursor: pointer;
    }

    button:hover {
      background: #00ffff;
      color: black;
      box-shadow: 0 0 15px #00ffff;
    }

    #log {
      width: 720px;
      margin: 20px auto;
      font-size: 12px;
      opacity: 0.8;
      min-height: 40px;
    }
  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="bootOverlay">
  <div id="bootText">INITIALIZING AI CORE...</div>
</div>

<h1>PROJECT DRISHTI</h1>
<div id="status">SYSTEM: IDLE</div>

<div id="videoContainer">
  <video id="video" autoplay muted></video>
  <canvas id="canvas"></canvas>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <canvas id="radar"></canvas>
</div>

<div id="distanceBarContainer">
  <div id="distanceBar"></div>
</div>

<button onclick="startSystem()">ACTIVATE</button>
<button onclick="stopSystem()">SHUTDOWN</button>

<div id="log">Awaiting activation...</div>

<script>
/* ===== PARTICLE BACKGROUND ===== */
const pCanvas = document.getElementById("particles");
const pCtx = pCanvas.getContext("2d");
pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random()*pCanvas.width,
    y: Math.random()*pCanvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function drawParticles() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  pCtx.fillStyle="#00ffff";
  particles.forEach(p=>{
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fill();
    p.y += p.d;
    if(p.y>pCanvas.height)p.y=0;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ===== AI SYSTEM ===== */
let model, stream, detecting=false;
let previousObjects=new Set();
let dangerState=false;
let speaking=false;

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const radar=document.getElementById("radar");
const rCtx=radar.getContext("2d");
radar.width=120; radar.height=120;

function speak(text){
 if(speaking)return;
 let u=new SpeechSynthesisUtterance(text);
 u.onstart=()=>speaking=true;
 u.onend=()=>speaking=false;
 window.speechSynthesis.speak(u);
}

async function startSystem(){
 document.getElementById("bootOverlay").style.display="flex";
 speak("Initializing vision system");
 await new Promise(r=>setTimeout(r,1500));
 model=await cocoSsd.load();
 document.getElementById("bootOverlay").style.display="none";

 stream=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=stream;

 video.onloadedmetadata=()=>{
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  detecting=true;
  detectFrame();
 };
}

function stopSystem(){
 detecting=false;
 if(stream)stream.getTracks().forEach(t=>t.stop());
 window.speechSynthesis.cancel();
 previousObjects.clear();
}

async function detectFrame(){
 if(!detecting)return;

 const predictions=await model.detect(video);
 ctx.clearRect(0,0,canvas.width,canvas.height);
 rCtx.clearRect(0,0,120,120);

 let current=new Set();
 let closestWidth=0;

 predictions.forEach(p=>{
  if(p.score<0.7)return;

  const[x,y,w,h]=p.bbox;
  ctx.strokeStyle="#00ffff";
  ctx.strokeRect(x,y,w,h);
  ctx.fillStyle="#00ffff";
  ctx.fillText(p.class,x,y>10?y-5:10);

  current.add(p.class);
  if(w>closestWidth)closestWidth=w;

  // radar dot
  let rx=(x/canvas.width)*120;
  let ry=(y/canvas.height)*120;
  rCtx.fillStyle="#00ffff";
  rCtx.beginPath();
  rCtx.arc(rx,ry,4,0,Math.PI*2);
  rCtx.fill();
 });

 current.forEach(o=>{
  if(!previousObjects.has(o))speak(o+" detected");
 });

 previousObjects=current;

 requestAnimationFrame(detectFrame);
}
</script>

</body>
</html>
