<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Drishti - AI Vision System</title>
    
    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <!-- COCO-SSD Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    
    <style>
        /* ============================================
           CSS RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Orbitron', 'Segoe UI', 'Roboto', sans-serif;
            background: #000;
            color: #00ffff;
        }

        /* ============================================
           ANIMATED GRID BACKGROUND
           ============================================ */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* ============================================
           SCANLINES OVERLAY
           ============================================ */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.3) 2px,
                rgba(0, 0, 0, 0.3) 4px
            );
            pointer-events: none;
            z-index: 1000;
            animation: scanlineFlicker 0.1s infinite;
        }

        @keyframes scanlineFlicker {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.85; }
        }

        /* ============================================
           PARTICLE ANIMATION CANVAS
           ============================================ */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ============================================
           MAIN CONTAINER
           ============================================ */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ============================================
           TITLE
           ============================================ */
        .title-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s linear infinite;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(0, 255, 255, 0.6);
            letter-spacing: 4px;
            margin-top: 5px;
        }

        @keyframes titleGlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* ============================================
           CAMERA CONTAINER
           ============================================ */
        .camera-wrapper {
            position: relative;
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 4/3;
            margin: 0 auto;
        }

        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.3),
                inset 0 0 30px rgba(0, 255, 255, 0.1);
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1);
        }

        /* ============================================
           JARVIS ROTATING RING
           ============================================ */
        .jarvis-ring-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 20;
        }

        .jarvis-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: jarvisRotate 2s linear infinite;
        }

        .jarvis-ring:nth-child(1) {
            animation-duration: 2s;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .jarvis-ring:nth-child(2) {
            animation-duration: 3s;
            animation-direction: reverse;
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: #ff00ff;
        }

        .jarvis-ring:nth-child(3) {
            animation-duration: 4s;
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            border-top-color: #ffff00;
        }

        .jarvis-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.8), transparent);
            border-radius: 50%;
            animation: corePulse 1.5s ease-in-out infinite;
        }

        @keyframes jarvisRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes corePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
        }

        /* ============================================
           RADAR MINI-MAP
           ============================================ */
        .radar-container {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.7);
            z-index: 30;
        }

        #radarCanvas {
            width: 100%;
            height: 100%;
        }

        .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.8), transparent);
            transform-origin: left center;
            animation: radarSweep 3s linear infinite;
        }

        @keyframes radarSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .radar-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at center, transparent 30%, transparent 31%, rgba(0, 255, 255, 0.1) 31%, transparent 32%),
                radial-gradient(circle at center, transparent 60%, transparent 61%, rgba(0, 255, 255, 0.1) 61%, transparent 62%);
        }

        /* ============================================
           HUD CORNER ACCENTS
           ============================================ */
        .hud-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            z-index: 25;
        }

        .hud-corner::before,
        .hud-corner::after {
            content: '';
            position: absolute;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
        }

        .hud-corner.top-left {
            top: 10px;
            left: 10px;
        }
        .hud-corner.top-left::before {
            width: 100%;
            height: 2px;
            top: 0;
            left: 0;
        }
        .hud-corner.top-left::after {
            width: 2px;
            height: 100%;
            top: 0;
            left: 0;
        }

        .hud-corner.top-right {
            top: 10px;
            right: 10px;
        }
        .hud-corner.top-right::before {
            width: 100%;
            height: 2px;
            top: 0;
            right: 0;
        }
        .hud-corner.top-right::after {
            width: 2px;
            height: 100%;
            top: 0;
            right: 0;
        }

        .hud-corner.bottom-left {
            bottom: 10px;
            left: 10px;
        }
        .hud-corner.bottom-left::before {
            width: 100%;
            height: 2px;
            bottom: 0;
            left: 0;
        }
        .hud-corner.bottom-left::after {
            width: 2px;
            height: 100%;
            bottom: 0;
            left: 0;
        }

        .hud-corner.bottom-right {
            bottom: 10px;
            right: 10px;
        }
        .hud-corner.bottom-right::before {
            width: 100%;
            height: 2px;
            bottom: 0;
            right: 0;
        }
        .hud-corner.bottom-right::after {
            width: 2px;
            height: 100%;
            bottom: 0;
            right: 0;
        }

        /* ============================================
           STATUS INDICATORS
           ============================================ */
        .status-bar {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.7rem;
            z-index: 30;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            box-shadow: 0 0 5px currentColor;
        }

        .status-dot.active {
            background: #00ff00;
            animation: statusPulse 1s ease-in-out infinite;
        }

        .status-dot.error {
            background: #ff0000;
        }

        .status-dot.loading {
            background: #ffff00;
            animation: statusBlink 0.5s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ============================================
           CONTROL BUTTONS
           ============================================ */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .control-btn {
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .control-btn:hover::before {
            left: 100%;
        }

        .btn-activate {
            background: linear-gradient(135deg, #00ffff, #0088aa);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .btn-activate:hover {
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            transform: scale(1.05);
        }

        .btn-activate:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-shutdown {
            background: linear-gradient(135deg, #ff0055, #aa0033);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
        }

        .btn-shutdown:hover {
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.8);
            transform: scale(1.05);
        }

        .btn-shutdown:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================
           OBJECT COUNTER
           ============================================ */
        .object-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            font-size: 0.8rem;
            z-index: 30;
        }

        .counter-label {
            color: rgba(0, 255, 255, 0.6);
            font-size: 0.7rem;
        }

        .counter-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* ============================================
           FPS COUNTER
           ============================================ */
        .fps-counter {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.7rem;
            color: rgba(0, 255, 255, 0.6);
            z-index: 30;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            .title {
                font-size: 1.5rem;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 0.7rem;
            }

            .camera-wrapper {
                width: 95vw;
            }

            .radar-container {
                width: 80px;
                height: 80px;
                bottom: 10px;
                right: 10px;
            }

            .control-btn {
                padding: 12px 25px;
                font-size: 0.8rem;
                letter-spacing: 2px;
            }

            .controls {
                gap: 10px;
            }

            .jarvis-ring-container {
                width: 80px;
                height: 80px;
            }

            .status-bar {
                font-size: 0.6rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .control-btn {
                padding: 10px 20px;
                font-size: 0.7rem;
            }

            .radar-container {
                width: 60px;
                height: 60px;
            }

            .jarvis-ring-container {
                width: 60px;
                height: 60px;
            }
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 1rem;
            color: #00ffff;
            margin-top: 20px;
            animation: loadingPulse 1s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ============================================
           DETECTION BOXES STYLES (Applied via Canvas)
           ============================================ */
        
        /* Log panel styles are handled in log.js */
    </style>
</head>
<body>
    <!-- Animated Grid Background -->
    <div class="grid-background"></div>
    
    <!-- Particle Animation Canvas -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- Scanlines Overlay -->
    <div class="scanlines"></div>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- Title -->
        <div class="title-container">
            <h1 class="title">Project Drishti</h1>
            <p class="subtitle">AI Vision System v2.0</p>
        </div>
        
        <!-- Camera Wrapper -->
        <div class="camera-wrapper">
            <div class="camera-container">
                <!-- Video Element -->
                <video id="videoElement" autoplay playsinline muted></video>
                
                <!-- Overlay Canvas for Detection Boxes -->
                <canvas id="overlayCanvas"></canvas>
                
                <!-- HUD Corner Accents -->
                <div class="hud-corner top-left"></div>

                <div class="status-bar">

                    <div class="status-item">

                        <span class="status-dot" id="detectionStatus"></span>

                    </div>
                    <div class="status-item">

                <div class="loading-overlay" id="loadingOverlay">

        <!-- Control Buttons -->
        <div class="controls">
            <button class="control-btn btn-activate" id="activateBtn" onclick="startSystem()">
                ACTIVATE

            <button class="control-btn btn-shutdown" id="shutdownBtn" onclick="stopSystem()" disabled>
                SHUTDOWN
            </button>
        </div>
    </div>
    
    <!-- External Scripts (MUST match file names EXACTLY) -->
<script src="Voice.js"></script>
<script src="Camera.js"></script>
<script src="Detection.js"></script>
<script src="Log.js"></script>
    
    <!-- Particle Animation (UI only) -->
    <script>
        // Particle Animation System
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            
            let particles = [];
            const particleCount = 50;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            class Particle {
                constructor() {
                    this.reset();
                }
                
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3 + 1;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.hue = Math.random() > 0.5 ? 180 : 300; // Cyan or Magenta
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x < 0 || this.x > canvas.width ||
                        this.y < 0 || this.y > canvas.height) {
                        this.reset();
                    }
                }
                
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.opacity})`;
                    ctx.fill();
                    
                    // Glow effect
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, 0.5)`;
                }
            }
            
            function init() {
                resizeCanvas();
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
                
                // Draw connections
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 100) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 * (1 - distance / 100)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    });
                });
                
                requestAnimationFrame(animate);
            }
            
            window.addEventListener('resize', resizeCanvas);
            init();
            animate();
        })();
    </script>
</body>
