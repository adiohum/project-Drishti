<!DOCTYPE html>
<html>
<head>
  <title>Project Drishti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      margin-top: 20px;
    }

    #videoContainer {
      position: relative;
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    video, canvas {
      width: 640px;
      height: 480px;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .controls {
      margin-top: 15px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .start {
      background: #06b6d4;
    }

    .stop {
      background: #ef4444;
    }

    #log {
      margin-top: 20px;
      width: 640px;
      max-height: 150px;
      overflow-y: auto;
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>Project Drishti - Smart Vision System</h2>

<div id="videoContainer">
  <video id="video" autoplay muted></video>
  <canvas id="canvas"></canvas>
</div>

<div class="controls">
  <button class="start" onclick="startCamera()">Start Camera</button>
  <button class="stop" onclick="stopCamera()">Stop Camera</button>
</div>

<div id="log">Detection Log...</div>

<script>
let model;
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let logDiv = document.getElementById("log");
let stream = null;
let detecting = false;

async function loadModel() {
  model = await cocoSsd.load();
  console.log("Model Loaded");
}

async function startCamera() {
  if (!model) await loadModel();

  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    detecting = true;
    detectFrame();
  };
}

function stopCamera() {
  detecting = false;
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  logDiv.innerHTML = "Camera stopped.";
}

async function detectFrame() {
  if (!detecting) return;

  const predictions = await model.detect(video);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let logText = "";

  predictions.forEach(prediction => {
    const [x, y, width, height] = prediction.bbox;

    ctx.strokeStyle = "#00ffff";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, width, height);

    ctx.fillStyle = "#00ffff";
    ctx.font = "16px Arial";
    ctx.fillText(
      `${prediction.class} - ${estimateDistance(width)}`,
      x,
      y > 10 ? y - 5 : 10
    );

    logText += `${prediction.class} - ${estimateDistance(width)}<br>`;
  });

  logDiv.innerHTML = logText || "No objects detected.";

  requestAnimationFrame(detectFrame);
}

function estimateDistance(boxWidth) {
  if (boxWidth > 300) return "Very Close";
  if (boxWidth > 150) return "Moderate";
  return "Far";
}
</script>

</body>
</html>
