<!DOCTYPE html>
<html>
<head>
  <title>PROJECT DRISHTI - AI VISION CORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Orbitron Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- TensorFlow + COCO SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body{
      margin:0;
      font-family:'Orbitron',sans-serif;
      background:black;
      color:#00ffff;
      overflow:hidden;
      text-align:center;
    }

    /* ===== PARTICLES ===== */
    #particles{
      position:fixed;
      top:0;
      left:0;
      z-index:-3;
    }

    /* ===== CYBER GRID ===== */
    body::before{
      content:"";
      position:fixed;
      width:200%;
      height:200%;
      background-image:
        linear-gradient(rgba(0,255,255,0.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,255,0.05) 1px,transparent 1px);
      background-size:60px 60px;
      animation:gridMove 25s linear infinite;
      z-index:-2;
    }

    @keyframes gridMove{
      from{transform:translate(0,0);}
      to{transform:translate(-60px,-60px);}
    }

    /* ===== SCANLINES ===== */
    body::after{
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,255,0.03) 0px,
        rgba(0,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
      );
      pointer-events:none;
      z-index:-1;
    }

    h1{
      margin-top:20px;
      letter-spacing:4px;
      text-shadow:0 0 15px #00ffff;
    }

    /* ===== CENTERED CAMERA CONTAINER ===== */
    #videoContainer{
      position:relative;
      width:90%;
      max-width:720px;
      aspect-ratio:16/9;
      margin:40px auto;
      border:2px solid #00ffff;
      border-radius:16px;
      box-shadow:0 0 40px #00ffff;
      overflow:hidden;
      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(6px);
      transition:0.3s ease;
    }

    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;
    }

    /* ===== HUD CORNERS ===== */
    .corner{
      position:absolute;
      width:40px;
      height:40px;
      border:2px solid #00ffff;
    }

    .tl{top:10px;left:10px;border-right:none;border-bottom:none;}
    .tr{top:10px;right:10px;border-left:none;border-bottom:none;}
    .bl{bottom:10px;left:10px;border-right:none;border-top:none;}
    .br{bottom:10px;right:10px;border-left:none;border-top:none;}

    /* ===== RADAR ===== */
    #radar{
      position:absolute;
      bottom:15px;
      right:15px;
      width:130px;
      height:130px;
      border-radius:50%;
      border:2px solid #00ffff;
      background:rgba(0,0,0,0.5);
    }

    /* ===== JARVIS RING ===== */
    #jarvis{
      position:absolute;
      top:50%;
      left:50%;
      width:250px;
      height:250px;
      margin:-125px;
      border-radius:50%;
      border:1px solid rgba(0,255,255,0.4);
      animation:rotate 15s linear infinite;
      pointer-events:none;
    }

    @keyframes rotate{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    /* ===== BUTTONS ===== */
    .controls{
      margin-top:20px;
    }

    button{
      margin:10px;
      padding:12px 28px;
      background:transparent;
      border:2px solid #00ffff;
      color:#00ffff;
      font-family:'Orbitron',sans-serif;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#00ffff;
      color:black;
      box-shadow:0 0 15px #00ffff;
    }

  </style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>PROJECT DRISHTI</h1>

<div id="videoContainer">

  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
  <canvas id="radar"></canvas>

  <div id="jarvis"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

</div>

<div class="controls">
  <button onclick="startSystem()">ACTIVATE</button>
  <button onclick="stopSystem()">SHUTDOWN</button>
</div>

<!-- PARTICLE SCRIPT (UI ONLY) -->
<script>
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");

function resizeParticles(){
  pCanvas.width=window.innerWidth;
  pCanvas.height=window.innerHeight;
}
resizeParticles();
window.addEventListener("resize",resizeParticles);

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*pCanvas.width,
    y:Math.random()*pCanvas.height,
    r:Math.random()*2,
    d:Math.random()*1
  });
}

function drawParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  pCtx.fillStyle="#00ffff";
  particles.forEach(p=>{
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fill();
    p.y+=p.d;
    if(p.y>pCanvas.height)p.y=0;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>

<!-- IMPORTANT: LOAD YOUR JS FILES IN THIS ORDER -->
<script src="voice.js"></script>
<script src="camera.js"></script>
<script src="detection.js"></script>
<script src="log.js"></script>

</body>
</html>
